name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ vars.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ vars.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          args=(deploy --prebuilt --archive=tgz --yes)
          if [ "${{ github.ref_name }}" = "main" ]; then
            args+=(--prod)
          fi
          args+=(--token "${{ vars.VERCEL_TOKEN }}")

          for attempt in 1 2 3; do
            if vercel "${args[@]}"; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Deploy attempt $attempt failed. Retrying in 60s..."
              sleep 60
            fi
          done

          echo "::error::Vercel deployment failed after 3 attempts."
          exit 1
